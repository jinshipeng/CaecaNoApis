{% extends "base.html" %}
{% block title %}采购订单表单{% endblock %}
{% block content %}
<div class="container-fluid mt-3">
  <h4>采购订单表单</h4>
  <div class="alert alert-info">此页面由Vue3前端渲染，如看到此说明请通过前端访问</div>
  <div class="card mt-3"><div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label>供应商</label><select name="supplier" class="form-select"><option value="">请选择</option></select></div>
      <div class="mb-3"><label>物料编码</label><input name="material_code" class="form-control"></div>
      <div class="mb-3"><label>数量</label><input name="quantity" type="number" class="form-control"></div>
      <div class="mb-3"><label>单价</label><input name="unit_price" type="number" step="0.01" class="form-control"></div>
      <div class="mb-3"><label>交期</label><input name="delivery_date" type="date" class="form-control"></div>
      <button type="submit" class="btn btn-primary">保存</button>
    </form>
  </div></div>
</div>
{% endblock %}
