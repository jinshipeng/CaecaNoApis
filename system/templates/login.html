{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="container mt-5" style="max-width:400px">
  <div class="card"><div class="card-body">
    <h4 class="text-center mb-4">供应链智能运营系统</h4>
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label>用户名</label><input name="username" class="form-control" required></div>
      <div class="mb-3"><label>密码</label><input name="password" type="password" class="form-control" required></div>
      <button type="submit" class="btn btn-primary w-100">登录</button>
    </form>
  </div></div>
</div>
{% endblock %}
